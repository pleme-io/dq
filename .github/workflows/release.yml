name: release

# Build + publish `dq` binaries for macOS and Linux on every tag push
# and via manual dispatch. Downstream consumers (e.g. the
# `akeylesslabs/akeyless-environments` repo-document skill) fetch
# these artefacts via `rebuild-vendor` when they want to refresh
# their vendored `dq` without running the nix build locally.
#
# Runners:
#   - macos-14  → aarch64-darwin (Apple Silicon)
#   - macos-13  → x86_64-darwin  (Intel)
#   - ubuntu-24.04        → x86_64-linux (glibc)
#   - ubuntu-24.04-arm    → aarch64-linux (glibc)
#
# The `lisp` feature is enabled on every build so `dq verify-mermaid`
# (and therefore the repo-document pipeline's I9 projection-hash
# round-trip) works out of the box.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
          - slug: darwin-x86_64
            runner: macos-13
            rust_target: x86_64-apple-darwin
          - slug: linux-x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - slug: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.slug }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.slug }}-

      - name: Build release (with lisp feature)
        run: |
          cargo build --release --bin dq \
            --features lisp \
            --target ${{ matrix.rust_target }}
          cp target/${{ matrix.rust_target }}/release/dq dq-${{ matrix.slug }}
          shasum -a 256 dq-${{ matrix.slug }} > dq-${{ matrix.slug }}.sha256

      - name: Sanity-check the binary
        # Make sure the binary actually runs and includes the lisp
        # feature (i.e. has `verify-mermaid` as a subcommand).
        # Skipping on cross-arch Linux runners where the ARM64 runner
        # is native; the matrix already pairs each target with a
        # matching native runner.
        run: |
          ./dq-${{ matrix.slug }} --version
          ./dq-${{ matrix.slug }} verify-mermaid --help

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: dq-${{ matrix.slug }}
          path: |
            dq-${{ matrix.slug }}
            dq-${{ matrix.slug }}.sha256
          retention-days: 90

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artefact tree
        run: |
          mkdir -p release
          find dist -type f \( -name 'dq-*' -o -name 'dq-*.sha256' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
